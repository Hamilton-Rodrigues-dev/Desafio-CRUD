<form class="container" >
  <header class="header" >
    <h2 class="header__title" >Editar Produto</h2>
  </header>
  <section class="product">
    <div class="product__info" >
      <h3 class="product__name">Nome do Produto</h3>
      <input class="product__input" type="text">
    </div>
    <div class="product__info">
      <h3 class="product__description">Descrição do Produto</h3>
      <input class="product__input" type="text">
    </div>
    <div class="product__info">
      <h3 class="product__price">Preço do Produto</h3>
      <input class="product__input" type="text">
    </div>
    <div class="action-button">
      <button (click)="save.emit()"  class="action-button_save">Salvar</button>
      <button (click)="cancel.emit()" class="action-button_cancel" >Cancelar</button>
    </div>
  </section>
</form>
