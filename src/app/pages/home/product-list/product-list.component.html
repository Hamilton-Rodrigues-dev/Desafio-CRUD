<section class="container">
  <header class="header">
    <h1 class="header__title">Lista de Produtos</h1>
    <ul class="header header__list">
      <li>
        <p class="header_name">Nome do produto</p>
      </li>
      <li>
        <p class="header_description">Descricao do Produto</p>
      </li>
      <li>
        <p class="header_price">Precço do Produto</p>
      </li>
      <li>
        <p class="header_action">Ações</p>
      </li>
    </ul>
  </header>
  <main class="product-list">
    <ul class="product-list__product" *ngFor="let product of productList">
      <li>
        <p class="product-list__name">
          {{ product.nome }}
        </p>
      </li>
      <li>
        <p class="product-list__description">
          {{ product.descricao }}
        </p>
      </li>
      <li>
        <p class="product-list__price">
          {{ product.preco.toLocaleString('pt-br',{
      style: 'currency',
      currency: 'BRL',
    }) }}
        </p>
      </li>
      <div class="action-button">
        <button (click)="edit.emit(product.id)" class="action-button_edit">
          Editar
        </button>
        <button (click)="view.emit(product.id)" class="action-button_view">
          Visualizar
        </button>
      </div>
    </ul>
    <div class="action-button">
      <button (click)="novoProduto.emit()" class="action-button_new-product">
        + Adicionar Novo produto
      </button>
    </div>
  </main>
</section>
